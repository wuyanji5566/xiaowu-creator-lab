<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>创造方法论 — 小伍创造者实验室</title>
  <link rel="icon" href="assets/lab-bg.jpg">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <canvas class="star-dust" id="starDust" aria-hidden="true"></canvas>

  <nav class="nav">
    <a href="index.html" class="nav__link">← 返回基地</a>
  </nav>

  <header class="page-header">
    <h1 class="page-header__title">创造方法论</h1>
    <p class="page-header__sub">一个人的数字工厂，需要一套属于自己的创造系统。</p>
  </header>

  <section class="section section--compact">
    <div class="section__container section__container--medium">

      <div class="glass-panel reveal" style="margin-bottom:clamp(20px,3vw,28px)">
        <h3 style="font-size:1rem;font-weight:600;color:var(--ink-primary);margin-bottom:12px">核心信念</h3>
        <p style="font-size:0.92rem;color:var(--ink-secondary);line-height:1.85">
          一个普通人，借助AI，可以在100天内建立属于自己的数字工厂。<br>
          不需要团队，不需要融资，不需要等待——只需要持续创造。
        </p>
      </div>

      <div class="glass-panel reveal" style="margin-bottom:clamp(20px,3vw,28px)">
        <h3 style="font-size:1rem;font-weight:600;color:var(--ink-primary);margin-bottom:12px">创造原则</h3>
        <p style="font-size:0.92rem;color:var(--ink-secondary);line-height:1.85">
          不追求完美，追求存在。<br>
          不追求规模，追求闭环。<br>
          不追求一次做对，追求快速验证。<br>
          每一次创造都是一块砖，垒起来就是数字工厂。
        </p>
      </div>

      <div class="glass-panel reveal">
        <h3 style="font-size:1rem;font-weight:600;color:var(--ink-primary);margin-bottom:12px">创造流程</h3>
        <p style="font-size:0.92rem;color:var(--ink-secondary);line-height:1.85">
          想法 → AI辅助 → 样品 → 验证 → 迭代 → 作品 → 产品 → 资产。<br>
          每一步都用AI加速，每一步都比上一步更接近闭环。
        </p>
      </div>

    </div>
  </section>

  <div class="back-top">
    <a href="index.html" class="back-top__link">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M14 8H2M7 3l-5 5 5 5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>返回基地</span>
    </a>
  </div>

  <script src="script.js"></script>

</html>
