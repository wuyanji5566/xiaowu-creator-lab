  <canvas class="star-dust" id="starDust" aria-hidden="true"></canvas>

  <nav class="nav">

  <header class="page-header">
    <h1 class="page-header__title">企业AI实验室</h1>
    <p class="page-header__sub">帮助企业和个人把模糊的AI想法，变成可验证、可落地的样品和方案。</p>
  </header>

  <section class="section section--compact">
    <div class="section__container">

      <div class="contact-grid reveal">
        <div class="contact-card">
          <span class="contact-card__icon">α</span>
          <h3 class="contact-card__title">AI样品验证</h3>
          <p class="contact-card__text">有想法但不确定AI能不能做？我帮你快速做出一个可验证的最小样品。用最低成本看清方向，不花冤枉钱。</p>
        </div>
        <div class="contact-card">
          <span class="contact-card__icon">β</span>
          <h3 class="contact-card__title">企业AI诊断</h3>
          <p class="contact-card__text">想在企业里落地AI但不知道从哪里下手？我帮你梳理可行性路径和优先切入点，不卖概念，只做能落地的方案。</p>
        </div>
        <div class="contact-card">
          <span class="contact-card__icon">γ</span>
          <h3 class="contact-card__title">AI落地陪跑</h3>
          <p class="contact-card__text">从样品到落地，全程陪跑。确保AI方案不只是Demo，而是真正能跑在业务里的系统。</p>
        </div>
      </div>

      <p class="section__closing reveal">先从一个小样品开始，不急着做大系统。</p>

    </div>
  </section>
